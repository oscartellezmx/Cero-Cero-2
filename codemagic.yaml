workflows:
  upload-ipa:
    name: Upload IPA

    environment:
      vars:
        APP_STORE_CONNECT_KEY_IDENTIFIER: J4WSXL48G4
        APP_STORE_CONNECT_ISSUER_ID: aa6ad4ed-61c9-4450-86c4-950ef17604f7

    scripts:
      - name: Download IPA
        script: |
          curl -L -o app.ipa "https://www.dropbox.com/scl/fi/vnkn2v61z93qo0p5afx0d/ios-2.117896.1.ipa?rlkey=mrzqzwz3gm0kvsmkf9io96qlr&st=5rrv8d68&dl=1"

      - name: Create API key file
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          cat > ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8 << 'EOF'
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgB+cr6gZf4LC7G7NC
          gK8vhZBLMicrtWvnIAApScF6KS6gCgYIKoZIzj0DAQehRANCAAQqHZra0DeCgsFu
          CMgQCz7NuFmEPpFURk9suhI3R7jjRqnW/vmu7f5a1z3dKggIlquumtFdrE/C8GxD
          mBoumA8h
          -----END PRIVATE KEY-----
          EOF

      - name: Upload to App Store Connect
        script: |
          xcrun altool --upload-app \
            --type ios \
            --file app.ipa \
            --apiKey $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID
